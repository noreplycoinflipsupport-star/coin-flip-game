services:
  mongodb:
    image: mongo:7
    container_name: coinflip-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coinflip-app
    ports:
      - "5000:5000"
    volumes:
      - ./frontend:/frontend
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/coinflip
      - NODE_ENV=development

volumes:
  mongo-data:
