<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password - CoinFlip Admin</title>
  <link rel="manifest" href="/manifest.json" />
  <script>if(localStorage.getItem('cf_theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    .admin-card { background: var(--admin-surface); border: 1px solid var(--admin-border); border-radius: var(--admin-radius); padding: 28px; margin-bottom: 20px; max-width: 480px; }
    .admin-card h2 { font-size: 18px; margin-bottom: 20px; color: var(--admin-text); }
    .form-group { margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <a href="/admin/" class="sidebar-logo">
      <span class="logo-emoji">🪙</span>
      <span class="logo-text">CoinFlip</span>
      <span class="admin-badge">Admin</span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Overview</div>
      <a href="/admin/" class="sidebar-link" id="nav-dashboard"><span class="icon">📊</span> Dashboard</a>
      <div class="sidebar-section-label">Management</div>
      <a href="/admin/users.html" class="sidebar-link" id="nav-users"><span class="icon">👥</span> Users</a>
      <a href="/admin/transactions.html" class="sidebar-link" id="nav-transactions"><span class="icon">💰</span> Transactions <span class="sidebar-badge" id="pending-badge" style="display:none">0</span></a>
      <a href="/admin/game-history.html" class="sidebar-link" id="nav-games"><span class="icon">🎮</span> Game History</a>
      <div class="sidebar-section-label">Configuration</div>
      <a href="/admin/settings.html" class="sidebar-link" id="nav-settings"><span class="icon">⚙️</span> Settings</a>
      <a href="/admin/create-admin.html" class="sidebar-link" id="nav-create-admin"><span class="icon">👑</span> Create Admin</a>
      <a href="/admin/live-control.html" class="sidebar-link" id="nav-live-control"><span class="icon">🎯</span> Session Control</a>
      <a href="/admin/free-control.html" class="sidebar-link" id="nav-free-control"><span class="icon">🎮</span> Free Control</a>
      <a href="/admin/wallet.html" class="sidebar-link" id="nav-wallet"><span class="icon">🏦</span> Platform Wallet</a>
      <div class="sidebar-section-label">Account</div>
      <a href="/" class="sidebar-link"><span class="icon">🌐</span> View Site</a>
      <a href="/admin/change-password.html" class="sidebar-link active" id="nav-change-password"><span class="icon">🔑</span> Change Password</a>
      <a href="#" class="sidebar-link" onclick="adminLogout()"><span class="icon">🚪</span> Sign Out</a>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="btn btn-outline btn-sm" onclick="toggleSidebar()" style="display:none" id="menu-btn">☰</button>
        <span class="admin-page-title">Change Password</span>
      </div>
      <div class="admin-topbar-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleTheme()">🌙</button>
        <span id="admin-name" style="font-size:14px; color:var(--admin-text-sec);"></span>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <h2>🔑 Change Password</h2>

        <form id="change-password-form" onsubmit="handleChangePassword(event)">
          <div class="form-group">
            <label class="form-label" for="current-password">Current Password</label>
            <div class="password-field">
              <input type="password" id="current-password" class="form-input" placeholder="Enter current password" required />
              <button type="button" class="password-toggle" onclick="togglePassword(this)"><span class="eye-open">👁️</span><span class="eye-closed hidden">🙈</span></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <div class="password-field">
              <input type="password" id="new-password" class="form-input" placeholder="At least 6 characters" required minlength="6" />
              <button type="button" class="password-toggle" onclick="togglePassword(this)"><span class="eye-open">👁️</span><span class="eye-closed hidden">🙈</span></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm New Password</label>
            <div class="password-field">
              <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter new password" required minlength="6" />
              <button type="button" class="password-toggle" onclick="togglePassword(this)"><span class="eye-open">👁️</span><span class="eye-closed hidden">🙈</span></button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="padding:12px 28px; font-size:14px; border-radius:var(--admin-radius);">
            Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="/admin/admin.js"></script>
<script>
  async function handleChangePassword(e) {
    e.preventDefault();
    const current = document.getElementById('current-password').value;
    const newPass = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (newPass !== confirm) { showToast('Passwords do not match', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.innerHTML = '<div class="spinner" style="border-top-color:white;margin:auto;width:18px;height:18px;"></div> Updating...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${localStorage.getItem('cf_token')}` },
        body: JSON.stringify({ currentPassword: current, newPassword: newPass })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Password changed successfully!', 'success');
        document.getElementById('change-password-form').reset();
      } else {
        showToast(data.message, 'error');
      }
    } catch { showToast('Connection error', 'error'); }
    finally { btn.innerHTML = 'Update Password'; btn.disabled = false; }
  }

  function togglePassword(btn) {
    const input = btn.parentElement.querySelector('input');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.querySelector('.eye-open').classList.toggle('hidden');
    btn.querySelector('.eye-closed').classList.toggle('hidden');
  }

  checkAdmin();
</script>
</body>
</html>
