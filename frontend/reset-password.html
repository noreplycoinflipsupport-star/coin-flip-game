<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Reset Password - CoinFlip</title>
  <script>if(localStorage.getItem('cf_theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <meta name="description" content="Set a new password for your CoinFlip account" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/css/style2.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--google-bg); }
    .auth-container { width: 100%; max-width: 400px; padding: 16px; }
    .auth-card { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-2); padding: 40px; }
    .auth-logo { text-align: center; margin-bottom: 8px; font-size: 40px; }
    .auth-title { text-align: center; font-family: 'Google Sans', sans-serif; font-size: 24px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
    .auth-subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
    .success-box { background: rgba(52,168,83,.1); border: 1px solid rgba(52,168,83,.2); border-radius: var(--radius); padding: 20px; text-align: center; display: none; }
    .success-box.show { display: block; }
    .success-box h3 { color: var(--google-green); margin-bottom: 8px; }
    .success-box p { color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🪙</div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Choose a new password for your account</p>

    <form id="reset-form" onsubmit="handleResetPassword(event)">
      <div class="form-group" id="email-group">
        <label class="form-label" for="reset-email">Email Address</label>
        <input type="email" id="reset-email" class="form-input" placeholder="Enter your email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password" />
          <button type="button" class="password-toggle" onclick="togglePassword(this)"><span class='eye-open'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg></span><span class='eye-closed hidden'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/></svg></span></button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="password-field">
          <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter new password" required minlength="6" autocomplete="new-password" />
          <button type="button" class="password-toggle" onclick="togglePassword(this)"><span class='eye-open'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg></span><span class='eye-closed hidden'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/></svg></span></button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="submit-btn" style="width:100%; padding:14px; font-size:15px; border-radius:var(--radius); margin-top:8px;">
        Reset Password
      </button>
    </form>

    <div class="success-box" id="success-box">
      <h3>✅ Password Reset Successful!</h3>
      <p>You can now sign in with your new password.</p>
      <a href="/login.html" class="btn btn-primary" style="margin-top:16px; display:inline-block;">Sign In Now</a>
    </div>

    <div style="text-align:center; margin-top: 20px;">
      <a href="/login.html" style="font-size:13px; color:var(--text-hint); text-decoration:none;">← Back to Sign In</a>
    </div>
  </div>

  <div style="text-align:center; margin-top: 16px; font-size:11px; color:var(--text-hint);">Sub-powered by Google</div>
</div>

<script src="/js/app2.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    document.getElementById('reset-form').innerHTML = '<p style="text-align:center;color:var(--google-red);padding:20px;">Invalid or missing reset link. Please request a new one.</p><div style="text-align:center;margin-top:16px;"><a href="/forgot-password.html" class="btn btn-outline">Request Reset Link</a></div>';
  } else {
    document.getElementById('token-field')?.remove();
  }

  function togglePassword(btn) {
    const input = btn.parentElement.querySelector('input');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.querySelector('.eye-open').classList.toggle('hidden');
    btn.querySelector('.eye-closed').classList.toggle('hidden');
  }

  async function handleResetPassword(e) {
    e.preventDefault();
    const email = document.getElementById('reset-email').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (password !== confirm) {
      showToast('Passwords do not match', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.innerHTML = '<div class="spinner" style="border-top-color:white;margin:auto;"></div>';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, token, password })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-box').classList.add('show');
      } else {
        showToast(data.message, 'error');
        btn.innerHTML = 'Reset Password';
        btn.disabled = false;
      }
    } catch {
      showToast('Connection error. Try again.', 'error');
      btn.innerHTML = 'Reset Password';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
