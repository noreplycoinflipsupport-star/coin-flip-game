<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - CoinFlip</title>
  <script>if(localStorage.getItem('cf_theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <meta name="description" content="Sign in to your CoinFlip account" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style2.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--google-bg); }
    .auth-container { width: 100%; max-width: 400px; padding: 16px; }
    .auth-card { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-2); padding: 40px; }
    .auth-logo { text-align: center; margin-bottom: 8px; font-size: 40px; }
    .auth-title { text-align: center; font-family: 'Google Sans', sans-serif; font-size: 24px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
    .auth-subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
    .divider { text-align: center; position: relative; margin: 20px 0; }
    .divider::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; border-top: 1px solid var(--border); }
    .divider span { background: var(--surface); padding: 0 12px; position: relative; color: var(--text-hint); font-size: 12px; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
    .otp-digit { width: 48px; height: 52px; border: 2px solid var(--border); border-radius: var(--radius); text-align: center; font-size: 20px; font-weight: 700; background: var(--surface); color: var(--text-primary); outline: none; }
    .otp-digit:focus { border-color: var(--google-blue); }
  </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🪙</div>
    <h1 class="auth-title">Sign In</h1>
    <p class="auth-subtitle">to continue to CoinFlip</p>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your email" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" onclick="togglePassword(this)">👁️</button>
        </div>
      </div>

      <div style="text-align:right; margin-top:4px;">
        <a href="/forgot-password.html" style="font-size:12px; color:var(--google-blue); text-decoration:none;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="login-submit-btn" style="width:100%; padding:14px; font-size:15px; border-radius:var(--radius); margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="divider"><span>Don't have an account?</span></div>

    <a href="/register.html" class="btn btn-outline w-full" style="width:100%; padding:12px; font-size:14px; border-radius:var(--radius); text-align:center;">
      Create Account
    </a>

    <div style="text-align:center; margin-top: 20px;">
      <a href="/" style="font-size:13px; color:var(--text-hint); text-decoration:none;">← Back to Home</a>
    </div>
    <!-- OTP Section (shown when email not verified) -->
    <div id="otp-section" style="display:none;">
      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;" />
      <div style="text-align:center; margin-bottom:8px;"><span style="font-size:28px;">📧</span></div>
      <p style="text-align:center; color:var(--text-secondary); font-size:14px;">
        Email not verified!<br/>
        <span id="verify-email-display" style="font-weight:500;color:var(--text-primary);"></span>
      </p>
      <p style="text-align:center; color:var(--text-hint); font-size:12px; margin-bottom:12px;">
        Enter the 6-digit OTP sent to your email
      </p>
      <div class="otp-inputs" id="otp-inputs">
        <input class="otp-digit" maxlength="1" id="otp-0" oninput="otpInput(0)" onkeydown="otpKeydown(event, 0)" />
        <input class="otp-digit" maxlength="1" id="otp-1" oninput="otpInput(1)" onkeydown="otpKeydown(event, 1)" />
        <input class="otp-digit" maxlength="1" id="otp-2" oninput="otpInput(2)" onkeydown="otpKeydown(event, 2)" />
        <input class="otp-digit" maxlength="1" id="otp-3" oninput="otpInput(3)" onkeydown="otpKeydown(event, 3)" />
        <input class="otp-digit" maxlength="1" id="otp-4" oninput="otpInput(4)" onkeydown="otpKeydown(event, 4)" />
        <input class="otp-digit" maxlength="1" id="otp-5" oninput="otpInput(5)" onkeydown="otpKeydown(event, 5)" />
      </div>
      <button class="btn btn-primary" id="login-verify-btn" style="width:100%; padding:14px; border-radius:var(--radius);" onclick="handleLoginVerifyOTP()">
        Verify OTP
      </button>
      <div style="text-align:center; margin-top:12px;">
        <button onclick="resendLoginOTP()" style="background:none;border:none;color:var(--google-blue);cursor:pointer;font-size:13px;">
          Resend OTP
        </button>
      </div>
    </div>
  </div>

  <div style="text-align:center; margin-top: 16px; font-size:11px; color:var(--text-hint);">Sub-powered by Google</div>
</div>

<script src="/js/app2.js"></script>
<script>
  let pendingUserId = null;
  let pendingUserEmail = null;

  (async () => {
    if (localStorage.getItem('cf_token')) {
      try {
        const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${localStorage.getItem('cf_token')}` } });
        const d = await r.json();
        if (d.success) { window.location.href = d.user.role === 'admin' ? '/admin/' : '/'; return; }
      } catch {}
      window.location.href = '/';
    }
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-submit-btn');
    btn.innerHTML = '<div class="spinner" style="border-top-color:white;margin:auto;"></div>';
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success && data.emailVerified) {
        localStorage.setItem('cf_token', data.token);
        showToast('Welcome back! 🎉', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin/' : '/';
        }, 800);
      } else if (data.success && !data.emailVerified) {
        pendingUserId = data.userId;
        pendingUserEmail = data.user.email;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('otp-section').style.display = 'block';
        document.getElementById('verify-email-display').textContent = data.user.email;
        document.getElementById('login-submit-btn').innerHTML = 'Sign In';
        document.getElementById('login-submit-btn').disabled = false;
        showToast('Please verify your email first', 'warning');
        document.getElementById('otp-0').focus();
      } else {
        showToast(data.message, 'error');
        btn.innerHTML = 'Sign In';
        btn.disabled = false;
      }
    } catch {
      showToast('Connection error. Try again.', 'error');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  }

  function otpInput(index) {
    const val = document.getElementById(`otp-${index}`).value;
    if (val && index < 5) document.getElementById(`otp-${index + 1}`).focus();
  }

  function otpKeydown(e, index) {
    if (e.key === 'Backspace' && !document.getElementById(`otp-${index}`).value && index > 0) {
      document.getElementById(`otp-${index - 1}`).focus();
    }
  }

  function getOTP() {
    let otp = '';
    for (let i = 0; i < 6; i++) otp += document.getElementById(`otp-${i}`).value;
    return otp;
  }

  async function handleLoginVerifyOTP() {
    const otp = getOTP();
    if (otp.length !== 6) { showToast('Enter complete 6-digit OTP', 'error'); return; }

    const btn = document.getElementById('login-verify-btn');
    btn.innerHTML = '<div class="spinner" style="margin:auto;"></div>';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: pendingUserId, otp })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('cf_token', data.token);
        showToast('Email verified! Welcome! 🎉', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        showToast(data.message, 'error');
        btn.innerHTML = 'Verify OTP';
        btn.disabled = false;
      }
    } catch {
      showToast('Connection error', 'error');
      btn.innerHTML = 'Verify OTP';
      btn.disabled = false;
    }
  }

  async function resendLoginOTP() {
    if (!pendingUserId) return;
    try {
      await fetch(`${API}/auth/resend-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: pendingUserId })
      });
      showToast('OTP resent!', 'success');
    } catch { showToast('Error resending OTP', 'error'); }
  }
</script>
</body>
</html>
