<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Forgot Password - CoinFlip</title>
  <script>if(localStorage.getItem('cf_theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Reset your CoinFlip account password" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/css/style2.css?v=3" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--google-bg); }
    .auth-container { width: 100%; max-width: 400px; padding: 16px; }
    .auth-card { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-2); padding: 40px; }
    .auth-logo { text-align: center; margin-bottom: 8px; font-size: 40px; }
    .auth-title { text-align: center; font-family: 'Google Sans', sans-serif; font-size: 24px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
    .auth-subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
    .success-box { background: rgba(52,168,83,.1); border: 1px solid rgba(52,168,83,.2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--google-green); font-size: 14px; display: none; }
    .success-box.show { display: block; }
  </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🔐</div>
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

    <form id="forgot-form" onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your registered email" required autocomplete="email" />
      </div>

      <button type="submit" class="btn btn-primary w-full" id="submit-btn" style="width:100%; padding:14px; font-size:15px; border-radius:var(--radius); margin-top:8px;">
        Send Reset Link
      </button>
    </form>

    <div class="success-box" id="success-box">
      ✅ If that email exists, a password reset link has been sent. Please check your inbox (and spam folder).
    </div>

    <div style="text-align:center; margin-top: 20px;">
      <a href="/login.html" style="font-size:13px; color:var(--text-hint); text-decoration:none;">← Back to Sign In</a>
    </div>
  </div>

  <div style="text-align:center; margin-top: 16px; font-size:11px; color:var(--text-hint);">Sub-powered by Google</div>
</div>

<script src="/js/app2.js?v=3"></script>
<script>
  async function handleForgotPassword(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.innerHTML = '<div class="spinner" style="border-top-color:white;margin:auto;"></div>';
    btn.disabled = true;
    const email = document.getElementById('email').value;

    try {
      const res = await fetch(`${API}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('success-box').classList.add('show');
      } else {
        showToast(data.message, 'error');
        btn.innerHTML = 'Send Reset Link';
        btn.disabled = false;
      }
    } catch {
      showToast('Connection error. Try again.', 'error');
      btn.innerHTML = 'Send Reset Link';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
